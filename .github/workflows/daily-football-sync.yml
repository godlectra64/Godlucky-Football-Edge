name: Daily Football Sync

on:
  schedule:
    - cron: '10 0 * * *'
    - cron: '10 11 * * *'
    - cron: '40 16 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-football-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync football data
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SYNC_ENDPOINT: https://fzjbnxomflqopwhzxfog.supabase.co/functions/v1/sync-football-data
      EDGE_ADMIN_SECRET: ${{ secrets.EDGE_ADMIN_SECRET }}

    steps:
      - name: Run daily sync and result refresh
        shell: bash
        run: |
          node <<'NODE'
          const endpoint = process.env.SYNC_ENDPOINT
          const adminSecret = process.env.EDGE_ADMIN_SECRET

          if (!adminSecret) {
            throw new Error('Missing required GitHub secret: EDGE_ADMIN_SECRET')
          }

          function maskText(value) {
            return String(value)
              .split(adminSecret).join('[masked]')
              .replace(/sb_secret_[A-Za-z0-9._-]+/g, 'sb_secret_[masked]')
              .replace(/Bearer\s+[A-Za-z0-9._-]+/gi, 'Bearer [masked]')
          }

          function sanitize(value) {
            if (Array.isArray(value)) return value.map(sanitize)
            if (value && typeof value === 'object') {
              return Object.fromEntries(Object.entries(value)
                .filter(([key]) => !/authorization|apikey|api[_-]?key|sb_secret|secret|token|key/i.test(key))
                .map(([key, item]) => [key, sanitize(item)]))
            }
            if (typeof value === 'string') return maskText(value)
            return value
          }

          function hasItems(value) {
            return Array.isArray(value) && value.length > 0
          }

          function hasFailedStep(result) {
            return hasItems(result.steps) && result.steps.some((step) => step?.status === 'failed')
          }

          function assertGenericModeSuccess(mode, result) {
            if (Number(result.failed ?? 0) > 0) {
              throw new Error(`${mode} reported failed=${result.failed}`)
            }
            if (hasItems(result.failures)) {
              throw new Error(`${mode} returned failures`)
            }
            if (hasFailedStep(result)) {
              throw new Error(`${mode} has a failed step`)
            }
          }

          function validateModeResult(mode, result) {
            if (result.ok === false) {
              throw new Error(`${mode} returned ok:false`)
            }
            if (mode !== 'daily-sync-auto') assertGenericModeSuccess(mode, result)
          }

          async function postSync(payload) {
            const response = await fetch(endpoint, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({ ...payload, sb_secret: adminSecret }),
            })
            const rawBody = await response.text()
            let body
            try {
              body = rawBody ? JSON.parse(rawBody) : {}
            } catch {
              body = { rawBody: maskText(rawBody) }
            }

            console.log(`${payload.mode} HTTP ${response.status}`)
            console.log(JSON.stringify(sanitize(body), null, 2))

            if (!response.ok) {
              throw new Error(`${payload.mode} failed with HTTP ${response.status}`)
            }
            validateModeResult(payload.mode, body)
            return body
          }

          const requiredPhases = ['core', 'fixture-enrichment', 'team-enrichment', 'league-enrichment', 'ranking']

          function getRequiredSteps(result) {
            const byPhase = new Map((result.steps ?? []).map((step) => [step.phase ?? step.mode, step]))
            return requiredPhases.map((phase) => byPhase.get(phase)).filter(Boolean)
          }

          function isComplete(result) {
            const required = getRequiredSteps(result)
            return result.status === 'success'
              && required.length === requiredPhases.length
              && required.every((step) => step.status === 'success')
          }

          function getBlockingStep(result) {
            const byPhase = new Map((result.steps ?? []).map((step) => [step.phase ?? step.mode, step]))
            return requiredPhases.map((phase) => byPhase.get(phase)).find((step) => !step || step.status !== 'success') ?? null
          }

          function getStepContinuationPolicy(step) {
            return step?.summary?.details?.continuationPolicy ?? step?.summary?.continuationPolicy ?? null
          }

          function getContinuationCursor(step) {
            const cursor = step?.continuation_state ?? {}
            return {
              providerPage: Number(cursor.providerPage ?? step?.provider_page ?? 1),
              fixtureOffset: Number(cursor.fixtureOffset ?? step?.fixture_offset ?? 0),
              oddsOffset: Number(cursor.oddsOffset ?? step?.odds_offset ?? 0),
              processedFixtureCount: Number(cursor.processedFixtureCount ?? step?.processed_fixture_count ?? 0),
              lastProcessedFixtureId: cursor.lastProcessedFixtureId ?? step?.last_processed_fixture_id ?? null,
              batchSignature: cursor.batchSignature ?? step?.batch_signature ?? null,
            }
          }

          function continuationCursorKey(result) {
            return JSON.stringify(getContinuationCursor(getBlockingStep(result)))
          }

          function classifyWorkflowContinuation(result) {
            const step = getBlockingStep(result)
            const policy = getStepContinuationPolicy(step)
            if (result.status === 'failed' || step?.status === 'failed') return { kind: 'real_failure', reason: policy?.reason ?? 'FAILED_STEP', step, policy }
            if (policy?.kind === 'real_failure') return { kind: 'real_failure', reason: policy.reason ?? 'REAL_FAILURE', step, policy }
            if (Array.isArray(result.invariantViolations) && result.invariantViolations.length) return { kind: 'real_failure', reason: 'INVARIANT_VIOLATION', step, policy }
            if (step?.status === 'running') return { kind: 'planned_continuation', reason: 'ACTIVE_ATOMIC_CLAIM', step, policy }
            if (step?.status === 'pending_retry' && policy?.kind === 'planned_continuation') {
              return { kind: 'planned_continuation', reason: policy.reason ?? 'PLANNED_CONTINUATION', step, policy }
            }
            if (step?.status === 'pending' && Number(result.failed ?? 0) === 0 && !hasItems(result.failures)) {
              return { kind: 'planned_continuation', reason: 'NEXT_REQUIRED_PHASE_PENDING', step, policy }
            }
            const legacyPlanned = step?.status === 'pending_retry'
              && Number(result.failed ?? 0) === 0
              && !hasItems(result.failures)
              && step?.rate_limited !== true
              && (step?.summary?.partial === true || step?.summary?.status === 'partial_success' || /SOFT_DEADLINE|PLANNED_CONTINUATION/.test(String(step?.summary?.message ?? step?.error_message ?? '')))
            if (legacyPlanned) return { kind: 'planned_continuation', reason: 'LEGACY_SAFE_CONTINUATION', step, policy }
            if (!step && isComplete(result)) return { kind: 'complete', reason: 'PIPELINE_COMPLETE', step, policy }
            return { kind: 'incomplete', reason: 'UNCLASSIFIED_INCOMPLETE_STATE', step, policy }
          }

          function hasGenericFailureAggregates(result) {
            return Number(result.failed ?? 0) > 0 || hasItems(result.failures) || hasFailedStep(result)
          }

          function isSafePlannedContinuation(result, disposition) {
            const step = disposition.step
            const policy = disposition.policy
            if (policy?.kind !== 'planned_continuation') return false
            const failureAttempts = Number(policy.failureAttemptCount ?? policy.failureAttempts ?? step?.summary?.details?.failureAttempts ?? result.failureAttempts)
            const progressVerified = policy.cursorProgress === true
              || ['CURSOR_ADVANCED', 'EXECUTION_BUDGET_DEFERRED'].includes(String(policy.reason ?? disposition.reason ?? ''))
            const aggregateFailures = Array.isArray(result.failures) ? result.failures : result.failures == null ? [] : [result.failures]
            const syntheticOnly = aggregateFailures.every((failure) => String(failure?.message ?? failure) === 'FAILED_COUNT_REPORTED')
            const diagnostics = JSON.stringify({
              resultErrorCode: result.errorCode ?? null,
              resultErrorMessage: result.errorMessage ?? null,
              stepError: step?.error_message ?? null,
              summaryErrorCode: step?.summary?.details?.errorCode ?? null,
              summaryErrorStage: step?.summary?.details?.errorStage ?? null,
              failures: result.failures ?? [],
            })
            const hasRealErrorDiagnostic = /API[_ -]?FOOTBALL|DATABASE|UPSTREAM|RATE[_ -]?LIMIT|DAILY_SYNC_STEP_CLAIM_LOST|CURSOR_REGRESSION|STUCK_CONTINUATION/i.test(diagnostics)
            const rateLimited = result.rateLimited === true || step?.rate_limited === true || step?.summary?.rateLimited === true
            const exhausted = Number.isFinite(failureAttempts) && failureAttempts >= Number(step?.max_attempts ?? 3)
            return failureAttempts === 0
              && progressVerified
              && syntheticOnly
              && !hasRealErrorDiagnostic
              && !rateLimited
              && !hasFailedStep(result)
              && !exhausted
          }

          function getRetryWindowDecision(result, nowMs = Date.now(), maxInlineWaitSeconds = 60) {
            const disposition = classifyWorkflowContinuation(result)
            const step = disposition.step
            if (step?.status === 'running' && disposition.kind === 'planned_continuation') return { action: 'schedule_next_workflow', retryAfterSeconds: 0, disposition }
            if (step?.status !== 'pending_retry') return { action: 'continue', retryAfterSeconds: 0, disposition }
            if (!step.next_retry_at) return { action: 'failure', reason: `pending_retry step ${step.phase} is missing next_retry_at`, disposition }
            const retryAfterSeconds = Math.ceil((new Date(step.next_retry_at).getTime() - nowMs) / 1000)
            if (!Number.isFinite(retryAfterSeconds)) return { action: 'failure', reason: `pending_retry step ${step.phase} has invalid next_retry_at`, disposition }
            if (retryAfterSeconds <= 0) return { action: 'continue', retryAfterSeconds: 0, disposition }
            if (disposition.kind !== 'planned_continuation') return { action: 'failure', reason: `Unclassified retry window for ${step.phase}`, disposition }
            if (retryAfterSeconds > maxInlineWaitSeconds) return { action: 'schedule_next_workflow', retryAfterSeconds, disposition }
            return { action: 'wait', retryAfterSeconds: Math.max(1, retryAfterSeconds), disposition }
          }

          function assertPipelineState(result, expectedRunId) {
            if (result.runId !== expectedRunId) throw new Error(`Continuation changed run id from ${expectedRunId} to ${result.runId ?? 'missing'}`)
            const required = getRequiredSteps(result)
            if (required.length !== requiredPhases.length) throw new Error(`Canonical run ${expectedRunId} is missing required steps`)
            for (const phase of requiredPhases) {
              if ((result.steps ?? []).filter((step) => (step.phase ?? step.mode) === phase).length !== 1) throw new Error(`Canonical run ${expectedRunId} has invalid step cardinality for ${phase}`)
            }
            const disposition = classifyWorkflowContinuation(result)
            const blocking = disposition.step ?? getBlockingStep(result)
            if (disposition.kind === 'real_failure') throw new Error(`Daily pipeline real failure at ${blocking?.phase ?? result.phase ?? 'unknown'}: ${disposition.reason}`)
            if (disposition.kind === 'planned_continuation') {
              if (disposition.policy?.kind === 'planned_continuation' && !isSafePlannedContinuation(result, disposition)) {
                throw new Error(`Daily pipeline rejected unsafe planned continuation at ${blocking?.phase ?? result.phase ?? 'unknown'}`)
              }
              if (hasGenericFailureAggregates(result) && disposition.policy?.kind !== 'planned_continuation') {
                assertGenericModeSuccess('daily-sync-auto', result)
              }
              return disposition
            }
            assertGenericModeSuccess('daily-sync-auto', result)
            return disposition
          }

          function logContinuation(result, invocation) {
            const step = getBlockingStep(result)
            const cursor = step?.continuation_state ?? {}
            console.log(JSON.stringify(sanitize({
              runId: result.runId,
              phase: step?.phase ?? result.phase ?? null,
              step: step?.step_order ?? null,
              invocation,
              attempt: step?.attempt_count ?? null,
              cursor: {
                providerPage: cursor.providerPage ?? step?.provider_page ?? null,
                fixtureOffset: cursor.fixtureOffset ?? step?.fixture_offset ?? null,
                oddsOffset: cursor.oddsOffset ?? step?.odds_offset ?? null,
                processedFixtureCount: cursor.processedFixtureCount ?? step?.processed_fixture_count ?? null,
                lastProcessedFixtureId: cursor.lastProcessedFixtureId ?? step?.last_processed_fixture_id ?? null,
                batchSignature: cursor.batchSignature ?? step?.batch_signature ?? null,
              },
              nextRetryAt: step?.next_retry_at ?? null,
              status: result.status,
              continuationKind: getStepContinuationPolicy(step)?.kind ?? null,
              continuationReason: getStepContinuationPolicy(step)?.reason ?? null,
            })))
          }

          async function waitForRetryWindow(result) {
            const decision = getRetryWindowDecision(result)
            if (decision.action === 'failure') throw new Error(decision.reason)
            if (decision.action === 'schedule_next_workflow') {
              const cursor = getContinuationCursor(decision.disposition.step)
              console.log(`continuation scheduled runId=${result.runId} phase=${decision.disposition.step?.phase ?? result.phase ?? 'unknown'} fixtureOffset=${cursor.fixtureOffset} processedFixtureCount=${cursor.processedFixtureCount} nextRetryAt=${decision.disposition.step?.next_retry_at}`)
              return decision
            }
            if (decision.action === 'wait') {
              console.log(`daily-sync-auto planned continuation; waiting ${decision.retryAfterSeconds}s for the persisted retry window`)
              await new Promise((resolve) => setTimeout(resolve, decision.retryAfterSeconds * 1000))
            }
            return decision
          }

          async function main() {
          let dailySync = await postSync({ mode: 'daily-sync-auto' })
          const runId = dailySync.runId
          if (!runId) {
            throw new Error('daily-sync-auto response did not include runId')
          }
          assertPipelineState(dailySync, runId)
          logContinuation(dailySync, 1)
          let continuationScheduled = false
          let invocationCount = 1
          let previousCursorKey = continuationCursorKey(dailySync)
          let repeatedNoProgress = 0

          for (let invocation = 2; invocation <= 12 && !isComplete(dailySync); invocation += 1) {
            const retryWindow = await waitForRetryWindow(dailySync)
            if (retryWindow.action === 'schedule_next_workflow') {
              continuationScheduled = true
              break
            }
            console.log(`Continuing daily-sync-auto run ${runId}; invocation ${invocation}/12`)
            dailySync = await postSync({
              mode: 'daily-sync-auto',
              runId,
              autoAdvance: true,
              maxStepsPerRequest: 2,
            })
            invocationCount = invocation
            assertPipelineState(dailySync, runId)
            logContinuation(dailySync, invocation)
            const disposition = classifyWorkflowContinuation(dailySync)
            const currentCursorKey = continuationCursorKey(dailySync)
            if (disposition.kind === 'planned_continuation' && currentCursorKey === previousCursorKey && disposition.reason !== 'EXECUTION_BUDGET_DEFERRED') {
              repeatedNoProgress += 1
            } else {
              repeatedNoProgress = 0
            }
            if (repeatedNoProgress >= 3) throw new Error(`STUCK_CONTINUATION: cursor did not advance for ${repeatedNoProgress} consecutive invocations`)
            previousCursorKey = currentCursorKey
          }

          if (!isComplete(dailySync)) {
            const step = getBlockingStep(dailySync)
            const disposition = classifyWorkflowContinuation(dailySync)
            const finalRetryWindow = getRetryWindowDecision(dailySync)
            if (finalRetryWindow.action === 'failure') throw new Error(finalRetryWindow.reason)
            if (disposition.kind !== 'planned_continuation') {
              throw new Error(`Daily pipeline incomplete after continuation budget: status=${dailySync.status ?? 'unknown'}, phase=${step?.phase ?? dailySync.phase ?? 'unknown'}, next_retry_at=${step?.next_retry_at ?? 'missing'}`)
            }
            const cursor = getContinuationCursor(step)
            console.log(`continuation scheduled runId=${runId} phase=${step?.phase ?? dailySync.phase ?? 'unknown'} fixtureOffset=${cursor.fixtureOffset} processedFixtureCount=${cursor.processedFixtureCount} nextRetryAt=${step?.next_retry_at ?? 'active-claim'} invocation=${invocationCount}/12 deferred=${continuationScheduled}`)
            console.log('Daily pipeline planned continuation accepted; the next scheduled workflow will resume the canonical run.')
          } else {
            console.log(`Daily Market-Ready pipeline ${runId} completed all required phases.`)
            await postSync({ mode: 'result-refresh', limit: 20 })
            console.log('Daily football sync workflow completed successfully.')
          }
          }

          main().catch((error) => {
            console.error(maskText(error?.stack ?? error?.message ?? error))
            process.exitCode = 1
          })
          NODE
