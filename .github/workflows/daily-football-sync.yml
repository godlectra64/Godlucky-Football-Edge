name: Daily Football Sync

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      continuation_chain_depth:
        description: 'Internal continuation chain depth'
        required: false
        default: '0'
        type: string

permissions:
  contents: read
  actions: write

concurrency:
  group: daily-football-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync football data
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SYNC_ENDPOINT: https://fzjbnxomflqopwhzxfog.supabase.co/functions/v1/sync-football-data
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      EDGE_ADMIN_SECRET: ${{ secrets.EDGE_ADMIN_SECRET }}
      GITHUB_TOKEN: ${{ github.token }}
      CONTINUATION_CHAIN_DEPTH: ${{ inputs.continuation_chain_depth || '0' }}

    steps:
      - name: Run daily sync and result refresh
        shell: bash
        run: |
          node <<'NODE'
          const endpoint = process.env.SYNC_ENDPOINT
          const supabaseUrl = process.env.SUPABASE_URL
          const serviceRoleKey = process.env.SUPABASE_SERVICE_ROLE_KEY
          const adminSecret = process.env.EDGE_ADMIN_SECRET
          const githubToken = process.env.GITHUB_TOKEN
          const githubRepository = process.env.GITHUB_REPOSITORY
          const eventName = process.env.GITHUB_EVENT_NAME || 'workflow_dispatch'

          if (!adminSecret) {
            throw new Error('Missing required GitHub secret: EDGE_ADMIN_SECRET')
          }

          function maskText(value) {
            return [adminSecret, serviceRoleKey, githubToken].filter(Boolean).reduce((text, secret) => text.split(secret).join('[masked]'), String(value))
              .replace(/sb_secret_[A-Za-z0-9._-]+/g, 'sb_secret_[masked]')
              .replace(/Bearer\s+[A-Za-z0-9._-]+/gi, 'Bearer [masked]')
          }

          function sanitize(value) {
            if (Array.isArray(value)) return value.map(sanitize)
            if (value && typeof value === 'object') {
              return Object.fromEntries(Object.entries(value)
                .filter(([key]) => !/authorization|apikey|api[_-]?key|sb_secret|secret|token|key/i.test(key))
                .map(([key, item]) => [key, sanitize(item)]))
            }
            if (typeof value === 'string') return maskText(value)
            return value
          }

          function hasItems(value) {
            return Array.isArray(value) && value.length > 0
          }

          function asArray(value) {
            return Array.isArray(value) ? value : value == null ? [] : [value]
          }

          function failureDiagnosticMessage(failure) {
            return String(failure?.message ?? failure).trim()
          }

          function isDerivedCounterAdvisoryDiagnostic(failure) {
            const message = failureDiagnosticMessage(failure)
            return /^(?:[A-Z0-9]+_)*(?:FAILED_COUNT|FAILURE_ATTEMPTS|FAILURES)_REPORTED$/.test(message)
          }

          function getFailureDiagnostics(result, step) {
            return [
              ...asArray(result.failures),
              ...asArray(step?.failures),
              ...asArray(step?.summary?.failures),
              ...asArray(step?.summary?.details?.failures),
            ]
          }

          function getCanonicalNonAdvisoryFailureDiagnostics(result, step) {
            return getFailureDiagnostics(result, step).filter((failure) => !isDerivedCounterAdvisoryDiagnostic(failure))
          }

          function hasExplicitRealError(value) {
            if (value == null || value === false || value === '') return false
            if (isDerivedCounterAdvisoryDiagnostic(value)) return false
            if (Array.isArray(value)) return value.some(hasExplicitRealError)
            if (typeof value === 'object') return Object.keys(value).length > 0
            if (typeof value === 'string') return value.trim().length > 0
            return true
          }

          function normalizeExplicitNonNegativeInteger(value) {
            if (typeof value === 'number') {
              return Number.isInteger(value) && value >= 0 ? value : null
            }
            if (typeof value !== 'string') return null
            const normalized = value.trim()
            if (!/^(?:0|[1-9]\d*)$/.test(normalized)) return null
            const parsed = Number(normalized)
            return Number.isSafeInteger(parsed) ? parsed : null
          }

          function maximumExplicitNonNegativeInteger(...values) {
            const counters = values
              .map(normalizeExplicitNonNegativeInteger)
              .filter((value) => value !== null)
            return counters.length > 0 ? Math.max(...counters) : null
          }

          function getCanonicalCurrentFailureEvidence(result, currentStep) {
            const policy = getStepContinuationPolicy(currentStep)
            const policyReason = failureDiagnosticMessage(policy?.reason ?? '')
            const failedCount = normalizeExplicitNonNegativeInteger(result.failed)
            const stepFailedCount = normalizeExplicitNonNegativeInteger(currentStep?.failed)
            const failureAttempts = maximumExplicitNonNegativeInteger(currentStep?.failureAttempts, currentStep?.failure_attempts)
            const maxAttempts = normalizeExplicitNonNegativeInteger(currentStep?.max_attempts)
            const exhausted = currentStep?.exhausted === true
              || currentStep?.summary?.exhausted === true
              || currentStep?.summary?.details?.exhausted === true
              || policy?.exhausted === true
              || (failureAttempts !== null && failureAttempts > 0 && maxAttempts !== null && failureAttempts >= maxAttempts)
            const failedEndpoints = [result.failedEndpoints, currentStep?.failedEndpoints, currentStep?.summary?.failedEndpoints]
              .flatMap(asArray)
            const rateLimited = result.rateLimited === true
              || currentStep?.rateLimited === true
              || currentStep?.rate_limited === true
              || currentStep?.summary?.rateLimited === true
            const mirroredPolicyError = policyReason && failureDiagnosticMessage(currentStep?.error_message ?? '') === policyReason
            const explicitErrors = [
              result.errorCode,
              result.error,
              result.errorMessage,
              currentStep?.error_code,
              mirroredPolicyError ? null : currentStep?.error_message,
              currentStep?.summary?.error,
              currentStep?.summary?.errorMessage,
              currentStep?.summary?.details?.errorCode,
              currentStep?.summary?.details?.errorStage,
              currentStep?.summary?.details?.error,
              currentStep?.summary?.details?.errorMessage,
            ].filter(hasExplicitRealError)
            const invariantViolations = asArray(result.invariantViolations).filter(hasExplicitRealError)
            const nonSyntheticFailures = getCanonicalNonAdvisoryFailureDiagnostics(result, currentStep)
            const reasons = []
            if (result.ok !== true) reasons.push('OK_NOT_TRUE')
            if (failedCount !== null && failedCount > 0) reasons.push('RESULT_FAILED_COUNT')
            if (currentStep?.status === 'failed') reasons.push('FAILED_STEP')
            if (stepFailedCount !== null && stepFailedCount > 0) reasons.push('STEP_FAILED_COUNT')
            if (failureAttempts !== null && failureAttempts > 0) reasons.push('FAILURE_ATTEMPTS_REPORTED')
            if (exhausted) reasons.push('EXHAUSTED_REAL_FAILURES')
            if (failedEndpoints.length > 0) reasons.push('FAILED_ENDPOINTS_REPORTED')
            if (rateLimited) reasons.push('RATE_LIMITED')
            if (explicitErrors.length > 0) reasons.push('EXPLICIT_CURRENT_ERROR')
            if (invariantViolations.length > 0) reasons.push('INVARIANT_VIOLATION')
            if (nonSyntheticFailures.length > 0) reasons.push('NON_SYNTHETIC_FAILURE_DIAGNOSTIC')
            return {
              hasRealFailure: reasons.length > 0,
              reasons,
              failedCount,
              stepFailedCount,
              failureAttempts,
              exhausted,
              failedEndpoints,
              explicitErrors: [...explicitErrors, ...invariantViolations],
              rateLimited,
              nonSyntheticFailures,
              policyReason,
            }
          }

          function hasFailedStep(result) {
            return hasItems(result.steps) && result.steps.some((step) => step?.status === 'failed')
          }

          function assertGenericModeSuccess(mode, result, { ignoreSyntheticFailureDiagnostics = false } = {}) {
            const failedCount = normalizeExplicitNonNegativeInteger(result.failed)
            if (failedCount !== null && failedCount > 0) {
              throw new Error(`${mode} reported failed=${result.failed}`)
            }
            const failures = ignoreSyntheticFailureDiagnostics
              ? asArray(result.failures).filter((failure) => !isDerivedCounterAdvisoryDiagnostic(failure))
              : result.failures
            if (hasItems(failures)) {
              throw new Error(`${mode} returned failures`)
            }
            if (hasFailedStep(result)) {
              throw new Error(`${mode} has a failed step`)
            }
          }

          function validateModeResult(mode, result) {
            if (result.ok === false || (mode === 'daily-sync-auto' && result.ok !== true)) {
              throw new Error(`${mode} returned ok:false`)
            }
            if (mode !== 'daily-sync-auto') assertGenericModeSuccess(mode, result)
          }

          async function postSync(payload) {
            const response = await fetch(endpoint, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({ ...payload, sb_secret: adminSecret }),
            })
            const rawBody = await response.text()
            let body
            try {
              body = rawBody ? JSON.parse(rawBody) : {}
            } catch {
              body = { rawBody: maskText(rawBody) }
            }

            console.log(`${payload.mode} HTTP ${response.status}`)
            console.log(JSON.stringify(sanitize(body), null, 2))

            if (!response.ok) {
              throw new Error(`${payload.mode} failed with HTTP ${response.status}`)
            }
            validateModeResult(payload.mode, body)
            return body
          }

          const requiredPhases = ['core', 'fixture-enrichment', 'team-enrichment', 'league-enrichment', 'ranking']

          function bangkokDateKey(now = new Date()) {
            const parts = new Intl.DateTimeFormat('en-CA', {
              timeZone: 'Asia/Bangkok',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
            }).formatToParts(now)
            const values = Object.fromEntries(parts.map((part) => [part.type, part.value]))
            return `${values.year}-${values.month}-${values.day}`
          }

          function getScheduledPreflightConfig() {
            const missing = [
              ['SUPABASE_URL', supabaseUrl],
              ['SUPABASE_SERVICE_ROLE_KEY', serviceRoleKey],
            ].filter(([, value]) => !value).map(([name]) => name)
            if (missing.length > 0) throw new Error(`Missing required scheduled preflight environment variables: ${missing.join(', ')}`)

            let parsedUrl
            try {
              parsedUrl = new URL(supabaseUrl)
            } catch {
              throw new Error('SUPABASE_URL must be a valid HTTPS URL for Supabase project fzjbnxomflqopwhzxfog')
            }
            if (parsedUrl.protocol !== 'https:' || parsedUrl.hostname !== 'fzjbnxomflqopwhzxfog.supabase.co') {
              throw new Error('SUPABASE_URL must point to Supabase project fzjbnxomflqopwhzxfog')
            }
            return {
              restEndpoint: `${parsedUrl.origin}/rest/v1`,
              serviceRoleKey,
            }
          }

          async function getRestRows(config, table, query, label) {
            const { restEndpoint, serviceRoleKey: restServiceRoleKey } = config
            const url = new URL(`${restEndpoint}/${table}`)
            for (const [key, value] of Object.entries(query)) url.searchParams.set(key, value)
            const response = await fetch(url, {
              method: 'GET',
              headers: {
                apikey: restServiceRoleKey,
                Authorization: `Bearer ${restServiceRoleKey}`,
                'Content-Type': 'application/json',
              },
            })
            const rawBody = await response.text()
            let body
            try {
              body = rawBody ? JSON.parse(rawBody) : []
            } catch {
              throw new Error(`${label} returned invalid JSON`)
            }
            if (!response.ok) throw new Error(`${label} failed with HTTP ${response.status}: ${maskText(JSON.stringify(sanitize(body)))}`)
            if (!Array.isArray(body)) throw new Error(`${label} did not return an array`)
            return body
          }

          async function getCanonicalRuns(config, runDate, label) {
            return getRestRows(config, 'api_football_daily_sync_runs', {
              select: 'id,run_date,mode,status,current_phase,started_at',
              run_date: `eq.${runDate}`,
              mode: 'eq.daily-full-sync-safe',
              order: 'started_at.desc',
              limit: '2',
            }, label)
          }

          async function getCanonicalSteps(config, runId, label) {
            return getRestRows(config, 'api_football_daily_sync_steps', {
              select: 'id,run_id,phase,step_order,status,next_retry_at,attempt_count,max_attempts,failed,summary,error_message',
              run_id: `eq.${runId}`,
              order: 'step_order.asc',
            }, label)
          }

          async function getCanonicalState(runDate, label) {
            const preflightConfig = getScheduledPreflightConfig()
            const runs = await getCanonicalRuns(preflightConfig, runDate, `${label} run`)
            if (runs.length !== 1) throw new Error(`${label} expected exactly one canonical run for ${runDate}; found ${runs.length}`)
            const run = runs[0]
            const steps = await getCanonicalSteps(preflightConfig, run.id, `${label} steps`)
            return { run, steps }
          }

          async function getScheduledContinuation(now = new Date()) {
            const preflightConfig = getScheduledPreflightConfig()
            const runDate = bangkokDateKey(now)
            const runs = await getCanonicalRuns(preflightConfig, runDate, 'canonical run preflight')
            if (runs.length > 1) throw new Error(`Canonical daily pipeline has duplicate runs for ${runDate}`)
            const run = runs[0]
            if (!run) return { bootstrap: true, due: false, reason: 'canonical_run_missing', runDate }

            const steps = await getCanonicalSteps(preflightConfig, run.id, 'canonical step preflight')
            const byPhase = new Map(steps.map((step) => [step.phase, step]))
            const missingPhase = requiredPhases.find((phase) => !byPhase.has(phase))
            if (missingPhase) return { due: false, reason: `canonical_step_missing_${missingPhase}`, runDate, runId: run.id, phase: missingPhase }
            const blocking = requiredPhases.map((phase) => byPhase.get(phase)).find((step) => step.status !== 'success') ?? null
            if (!blocking) return { due: false, reason: 'canonical_run_complete', runDate, runId: run.id }
            if (blocking.status !== 'pending_retry') {
              return { activeClaim: blocking.status === 'running', due: false, reason: `step_status_${blocking.status ?? 'missing'}`, runDate, runId: run.id, phase: blocking.phase ?? null }
            }
            const nextRetryMs = new Date(blocking.next_retry_at ?? '').getTime()
            if (!Number.isFinite(nextRetryMs)) throw new Error(`pending_retry step ${blocking.phase ?? 'unknown'} has invalid next_retry_at`)
            if (nextRetryMs > now.getTime()) {
              return { due: false, reason: 'retry_not_due', runDate, runId: run.id, phase: blocking.phase ?? null, nextRetryAt: blocking.next_retry_at }
            }
            return { due: true, reason: 'retry_due', runDate, runId: run.id, phase: blocking.phase ?? null, nextRetryAt: blocking.next_retry_at }
          }

          function assertCanonicalRunCreated(canonicalState, runDate, expectedRunId) {
            if (canonicalState.run.id !== expectedRunId) {
              throw new Error(`Daily bootstrap returned run ${expectedRunId}, but canonical run for ${runDate} is ${canonicalState.run.id}`)
            }
            console.log(`canonical run created runDate=${runDate} runId=${canonicalState.run.id}`)
            return canonicalState.run
          }

          function parseContinuationChainDepth(value) {
            const parsed = Number(value)
            return Number.isInteger(parsed) && parsed >= 0 ? parsed : 0
          }

          function getCanonicalStepFailureAttempts(step) {
            const policy = getStepContinuationPolicy(step)
            const policyFailureAttempts = ['planned_continuation', 'real_failure'].includes(policy?.kind)
              ? maximumExplicitNonNegativeInteger(policy?.failureAttemptCount, policy?.failureAttempts)
              : null
            return maximumExplicitNonNegativeInteger(
              step?.failureAttempts,
              step?.failure_attempts,
              policyFailureAttempts,
            ) ?? 0
          }

          function isCanonicalRetryExhausted(step) {
            const policy = getStepContinuationPolicy(step)
            const failureAttempts = getCanonicalStepFailureAttempts(step)
            const maxAttempts = normalizeExplicitNonNegativeInteger(step?.max_attempts)
            return step?.status === 'failed'
              || policy?.exhausted === true
              || step?.summary?.exhausted === true
              || step?.summary?.details?.exhausted === true
              || (failureAttempts > 0 && maxAttempts !== null && failureAttempts >= maxAttempts)
          }

          function getSelfContinuationDecision(canonicalState, expectedRunId) {
            const { run, steps } = canonicalState
            if (run?.id !== expectedRunId) return { required: false, fatal: true, reason: 'run_id_mismatch' }
            const byPhase = new Map()
            for (const step of steps ?? []) {
              if (!byPhase.has(step.phase)) byPhase.set(step.phase, [])
              byPhase.get(step.phase).push(step)
            }
            const invalidPhase = requiredPhases.find((phase) => byPhase.get(phase)?.length !== 1)
            if (invalidPhase) return { required: false, fatal: true, reason: `canonical_step_cardinality_${invalidPhase}` }
            const requiredSteps = requiredPhases.map((phase) => byPhase.get(phase)[0])
            const active = requiredSteps.find((step) => step.status === 'running')
            if (active) return { required: false, activeClaim: true, reason: 'active_claim', phase: active.phase }
            const failed = requiredSteps.find((step) => {
              const failedCount = normalizeExplicitNonNegativeInteger(step.failed)
              return step.status === 'failed' || (failedCount !== null && failedCount > 0)
            })
            if (failed) return { required: false, fatal: true, reason: `failed_step_${failed.phase}`, phase: failed.phase }
            const blocking = requiredSteps.find((step) => step.status !== 'success') ?? null
            if (!blocking || run.status === 'success') return { required: false, reason: 'canonical_run_complete' }
            if (String(run.current_phase ?? '').toLowerCase() === 'complete') return { required: false, fatal: true, reason: 'incomplete_steps_at_complete_phase' }
            if (run.status !== 'partial') return { required: false, reason: `run_status_${run.status ?? 'missing'}` }
            if (blocking.status !== 'pending_retry') return { required: false, reason: `step_status_${blocking.status ?? 'missing'}`, phase: blocking.phase }
            const policy = getStepContinuationPolicy(blocking)
            if (policy?.kind !== 'planned_continuation') {
              return { required: false, reason: `continuation_policy_${policy?.kind ?? 'missing'}`, phase: blocking.phase }
            }
            const failureAttempts = Math.max(...requiredSteps.map(getCanonicalStepFailureAttempts))
            if (failureAttempts > 0) return { required: false, fatal: true, reason: 'failure_attempts_reported', phase: blocking.phase, failureAttempts }
            if (isCanonicalRetryExhausted(blocking)) return { required: false, fatal: true, reason: 'retry_exhausted', phase: blocking.phase }
            const nextRetryMs = new Date(blocking.next_retry_at ?? '').getTime()
            if (!Number.isFinite(nextRetryMs)) return { required: false, fatal: true, reason: 'invalid_next_retry_at', phase: blocking.phase }
            return {
              required: true,
              reason: 'planned_continuation',
              phase: blocking.phase,
              nextRetryAt: blocking.next_retry_at,
            }
          }

          function getSelfContinuationWaitMs(nextRetryAt, nowMs = Date.now()) {
            const nextRetryMs = new Date(nextRetryAt ?? '').getTime()
            if (!Number.isFinite(nextRetryMs)) throw new Error('Self continuation requires a valid next_retry_at')
            return Math.min(900_000, Math.max(5_000, nextRetryMs - nowMs + 5_000))
          }

          async function waitForSelfContinuation(nextRetryAt) {
            const waitMs = getSelfContinuationWaitMs(nextRetryAt)
            console.log(`waiting for next_retry_at nextRetryAt=${nextRetryAt} waitMs=${waitMs}`)
            await new Promise((resolve) => setTimeout(resolve, waitMs))
          }

          async function dispatchSelfContinuation(nextDepth) {
            if (!githubToken) throw new Error('Self continuation dispatch requires the GitHub workflow token')
            if (!/^[^/\s]+\/[^/\s]+$/.test(githubRepository ?? '')) throw new Error('Self continuation dispatch requires a valid GitHub repository')
            const response = await fetch(`https://api.github.com/repos/${githubRepository}/actions/workflows/daily-football-sync.yml/dispatches`, {
              method: 'POST',
              headers: {
                Accept: 'application/vnd.github+json',
                Authorization: `Bearer ${githubToken}`,
                'X-GitHub-Api-Version': '2026-03-10',
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                ref: 'main',
                inputs: { continuation_chain_depth: String(nextDepth) },
              }),
            })
            if (![200, 204].includes(response.status)) {
              const kind = [401, 403].includes(response.status) ? 'was rejected' : 'failed'
              throw new Error(`Self continuation dispatch ${kind} with HTTP ${response.status}`)
            }
            console.log(`self continuation dispatched depth=${nextDepth}`)
          }

          function getRequiredSteps(result) {
            const byPhase = new Map((result.steps ?? []).map((step) => [step.phase ?? step.mode, step]))
            return requiredPhases.map((phase) => byPhase.get(phase)).filter(Boolean)
          }

          function isComplete(result) {
            const required = getRequiredSteps(result)
            return result.status === 'success'
              && required.length === requiredPhases.length
              && required.every((step) => step.status === 'success')
          }

          function getBlockingStep(result) {
            const byPhase = new Map((result.steps ?? []).map((step) => [step.phase ?? step.mode, step]))
            return requiredPhases.map((phase) => byPhase.get(phase)).find((step) => !step || step.status !== 'success') ?? null
          }

          function getStepContinuationPolicy(step) {
            return step?.summary?.details?.continuationPolicy ?? step?.summary?.continuationPolicy ?? null
          }

          function getContinuationCursor(step) {
            const cursor = step?.continuation_state ?? {}
            const stages = ['fixtures', 'coverage', 'rounds', 'complete']
            const coreAuxiliaryComplete = Boolean(cursor.coreAuxiliaryComplete)
            const requestedStage = coreAuxiliaryComplete ? 'complete' : String(cursor.coreStage ?? 'fixtures')
            const coreStage = requestedStage
            const stageIndex = stages.indexOf(coreStage)
            const processedFixtureIds = [...new Set(Array.isArray(cursor.processedFixtureIds)
              ? cursor.processedFixtureIds.map(Number).filter((value) => Number.isSafeInteger(value) && value > 0)
              : [])]
            return {
              providerPage: Number(cursor.providerPage ?? step?.provider_page ?? 1),
              fixtureOffset: Number(cursor.fixtureOffset ?? step?.fixture_offset ?? 0),
              oddsOffset: Number(cursor.oddsOffset ?? step?.odds_offset ?? 0),
              processedFixtureCount: Number(cursor.processedFixtureCount ?? step?.processed_fixture_count ?? 0),
              lastProcessedFixtureId: cursor.lastProcessedFixtureId ?? step?.last_processed_fixture_id ?? null,
              batchSignature: cursor.batchSignature ?? step?.batch_signature ?? null,
              completedBatchSignatures: [...new Set(Array.isArray(cursor.completedBatchSignatures) ? cursor.completedBatchSignatures.map(String) : [])],
              fixtureCursorMode: cursor.fixtureCursorMode ?? null,
              processedFixtureIds,
              uniqueProcessedFixtureCount: Number(cursor.uniqueProcessedFixtureCount ?? processedFixtureIds.length),
              fixtureCandidateCount: Number(cursor.fixtureCandidateCount ?? 0),
              fixtureRemainingCount: Number(cursor.fixtureRemainingCount ?? 0),
              fixtureSnapshotSignature: cursor.fixtureSnapshotSignature ?? null,
              fixtureStableEmptyPasses: Number(cursor.fixtureStableEmptyPasses ?? 0),
              legacyFixtureOffsetIgnored: Boolean(cursor.legacyFixtureOffsetIgnored),
              legacyFixtureOffsetValue: Number(cursor.legacyFixtureOffsetValue ?? 0),
              coreStage,
              coverageOffset: Number(cursor.coverageOffset ?? 0),
              coverageTotalCandidates: Number(cursor.coverageTotalCandidates ?? 0),
              coverageComplete: Boolean(cursor.coverageComplete) || stageIndex > stages.indexOf('coverage'),
              roundsOffset: Number(cursor.roundsOffset ?? 0),
              roundsTotalCandidates: Number(cursor.roundsTotalCandidates ?? 0),
              roundsComplete: Boolean(cursor.roundsComplete) || stageIndex > stages.indexOf('rounds'),
              coreAuxiliaryComplete: coreAuxiliaryComplete || coreStage === 'complete',
            }
          }

          function continuationCursorKey(result) {
            const step = getBlockingStep(result)
            const cursor = getContinuationCursor(step)
            return JSON.stringify({
              phase: step?.phase ?? step?.mode ?? null,
              providerPage: cursor.providerPage,
              fixtureOffset: cursor.fixtureOffset,
              oddsOffset: cursor.oddsOffset,
              processedFixtureCount: cursor.processedFixtureCount,
              fixtureCursorMode: cursor.fixtureCursorMode,
              processedFixtureIds: cursor.processedFixtureIds,
              uniqueProcessedFixtureCount: cursor.uniqueProcessedFixtureCount,
              fixtureCandidateCount: cursor.fixtureCandidateCount,
              fixtureRemainingCount: cursor.fixtureRemainingCount,
              fixtureSnapshotSignature: cursor.fixtureSnapshotSignature,
              fixtureStableEmptyPasses: cursor.fixtureStableEmptyPasses,
              legacyFixtureOffsetIgnored: cursor.legacyFixtureOffsetIgnored,
              legacyFixtureOffsetValue: cursor.legacyFixtureOffsetValue,
              completedBatchSignatures: cursor.completedBatchSignatures,
              coreStage: cursor.coreStage,
              coverageOffset: cursor.coverageOffset,
              coverageComplete: cursor.coverageComplete,
              roundsOffset: cursor.roundsOffset,
              roundsComplete: cursor.roundsComplete,
              coreAuxiliaryComplete: cursor.coreAuxiliaryComplete,
            })
          }

          function classifyWorkflowContinuation(result, evidenceOverride = null) {
            const step = getBlockingStep(result)
            const policy = getStepContinuationPolicy(step)
            const evidence = evidenceOverride ?? getCanonicalCurrentFailureEvidence(result, step)
            if (evidence.hasRealFailure) return { kind: 'real_failure', reason: evidence.reasons[0], step, policy, evidence }
            if (step?.status === 'running') return { kind: 'planned_continuation', reason: 'ACTIVE_ATOMIC_CLAIM', step, policy, evidence }
            if (step?.status === 'pending_retry' && policy?.kind === 'planned_continuation') {
              return { kind: 'planned_continuation', reason: policy.reason ?? 'PLANNED_CONTINUATION', step, policy, evidence }
            }
            const cursor = getContinuationCursor(step)
            const processedIdMode = cursor.fixtureCursorMode === 'processed-fixture-ids-v1'
            const derivedPlanned = step?.status === 'pending_retry'
              && validateContinuationCursor(cursor).valid
              && ((!processedIdMode && cursor.fixtureOffset > 0)
                || (!processedIdMode && cursor.processedFixtureCount > 0)
                || cursor.uniqueProcessedFixtureCount > 0
                || cursor.processedFixtureIds.length > 0
                || cursor.fixtureStableEmptyPasses > 0
                || cursor.oddsOffset > 0
                || cursor.coverageOffset > 0
                || cursor.roundsOffset > 0
                || cursor.coreStage !== 'fixtures'
                || cursor.coreAuxiliaryComplete
                || cursor.completedBatchSignatures.length > 0)
            if (derivedPlanned) return { kind: 'planned_continuation', reason: 'DERIVED_PERSISTED_PROGRESS', step, policy, evidence }
            if (step?.status === 'pending') {
              return { kind: 'planned_continuation', reason: 'NEXT_REQUIRED_PHASE_PENDING', step, policy, evidence }
            }
            const legacyPlanned = step?.status === 'pending_retry'
              && step?.rate_limited !== true
              && (step?.summary?.partial === true || step?.summary?.status === 'partial_success' || /SOFT_DEADLINE|PLANNED_CONTINUATION/.test(String(step?.summary?.message ?? step?.error_message ?? '')))
            if (legacyPlanned) return { kind: 'planned_continuation', reason: 'LEGACY_SAFE_CONTINUATION', step, policy, evidence }
            if (!step && isComplete(result)) return { kind: 'complete', reason: 'PIPELINE_COMPLETE', step, policy, evidence }
            return { kind: 'incomplete', reason: 'UNCLASSIFIED_INCOMPLETE_STATE', step, policy, evidence }
          }

          function validateContinuationCursor(cursor) {
            const numericFields = ['providerPage', 'fixtureOffset', 'oddsOffset', 'processedFixtureCount', 'uniqueProcessedFixtureCount', 'fixtureCandidateCount', 'fixtureRemainingCount', 'fixtureStableEmptyPasses', 'legacyFixtureOffsetValue', 'coverageOffset', 'coverageTotalCandidates', 'roundsOffset', 'roundsTotalCandidates']
            const malformedField = numericFields.find((field) => !Number.isFinite(cursor?.[field]) || cursor[field] < 0 || !Number.isInteger(cursor[field]))
            if (malformedField) return { valid: false, reason: `MALFORMED_CURSOR:${malformedField}` }
            if (cursor.providerPage !== 1) return { valid: false, reason: 'INVALID_PROVIDER_PAGE' }
            if (!['fixtures', 'coverage', 'rounds', 'complete'].includes(cursor.coreStage)) return { valid: false, reason: 'INVALID_CORE_STAGE' }
            if (cursor.fixtureCursorMode && cursor.fixtureCursorMode !== 'processed-fixture-ids-v1') return { valid: false, reason: 'INVALID_FIXTURE_CURSOR_MODE' }
            if (cursor.fixtureCursorMode === 'processed-fixture-ids-v1' && cursor.uniqueProcessedFixtureCount !== cursor.processedFixtureIds.length) return { valid: false, reason: 'INVALID_UNIQUE_PROCESSED_FIXTURE_COUNT' }
            if (cursor.fixtureStableEmptyPasses > 2) return { valid: false, reason: 'INVALID_FIXTURE_STABLE_EMPTY_PASSES' }
            return { valid: true, reason: null }
          }

          function inspectContinuationTransition(previousCursor, currentCursor) {
            const currentValidation = validateContinuationCursor(currentCursor)
            if (!currentValidation.valid) return { valid: false, regression: true, progress: false, reason: currentValidation.reason }
            if (!previousCursor) {
              const processedIdMode = currentCursor.fixtureCursorMode === 'processed-fixture-ids-v1'
              const persistedProgress = (!processedIdMode && currentCursor.fixtureOffset > 0)
                || (!processedIdMode && currentCursor.processedFixtureCount > 0)
                || currentCursor.uniqueProcessedFixtureCount > 0
                || currentCursor.processedFixtureIds.length > 0
                || currentCursor.fixtureStableEmptyPasses > 0
                || currentCursor.oddsOffset > 0
                || currentCursor.coverageOffset > 0
                || currentCursor.roundsOffset > 0
                || currentCursor.coreStage !== 'fixtures'
                || currentCursor.coreAuxiliaryComplete
                || currentCursor.completedBatchSignatures.length > 0
              return { valid: persistedProgress, regression: false, progress: persistedProgress, reason: persistedProgress ? 'PERSISTED_PROGRESS' : 'NO_INITIAL_PROGRESS' }
            }
            const previousValidation = validateContinuationCursor(previousCursor)
            if (!previousValidation.valid) return { valid: false, regression: true, progress: false, reason: previousValidation.reason }
            const processedIdMode = currentCursor.fixtureCursorMode === 'processed-fixture-ids-v1'
            const previousProcessedIdMode = previousCursor.fixtureCursorMode === 'processed-fixture-ids-v1'
            const regressionFields = ['providerPage', 'oddsOffset', 'coverageOffset', 'roundsOffset']
            if (!processedIdMode || !previousProcessedIdMode) regressionFields.push('fixtureOffset', 'processedFixtureCount')
            if (processedIdMode && previousProcessedIdMode) regressionFields.push('uniqueProcessedFixtureCount')
            const regressionField = regressionFields
              .find((field) => currentCursor[field] < previousCursor[field])
            if (regressionField) return { valid: false, regression: true, progress: false, reason: `CURSOR_REGRESSION:${regressionField}` }
            if (processedIdMode && previousProcessedIdMode && previousCursor.processedFixtureIds.some((fixtureId) => !currentCursor.processedFixtureIds.includes(fixtureId))) {
              return { valid: false, regression: true, progress: false, reason: 'CURSOR_REGRESSION:processedFixtureIds' }
            }
            const stages = ['fixtures', 'coverage', 'rounds', 'complete']
            if (stages.indexOf(currentCursor.coreStage) < stages.indexOf(previousCursor.coreStage)) return { valid: false, regression: true, progress: false, reason: 'CURSOR_REGRESSION:coreStage' }
            if (previousCursor.coverageComplete && !currentCursor.coverageComplete) return { valid: false, regression: true, progress: false, reason: 'CURSOR_REGRESSION:coverageComplete' }
            if (previousCursor.roundsComplete && !currentCursor.roundsComplete) return { valid: false, regression: true, progress: false, reason: 'CURSOR_REGRESSION:roundsComplete' }
            if (previousCursor.coreAuxiliaryComplete && !currentCursor.coreAuxiliaryComplete) return { valid: false, regression: true, progress: false, reason: 'CURSOR_REGRESSION:coreAuxiliaryComplete' }
            const addedBatchSignature = currentCursor.completedBatchSignatures.some((signature) => !previousCursor.completedBatchSignatures.includes(signature))
            if (!addedBatchSignature && previousCursor.completedBatchSignatures.some((signature) => !currentCursor.completedBatchSignatures.includes(signature))) return { valid: false, regression: true, progress: false, reason: 'CURSOR_REGRESSION:completedBatchSignatures' }
            const addedProcessedFixtureId = currentCursor.processedFixtureIds.some((fixtureId) => !previousCursor.processedFixtureIds.includes(fixtureId))
            const progressFields = ['providerPage', 'oddsOffset', 'coverageOffset', 'roundsOffset']
            if (!processedIdMode) progressFields.push('fixtureOffset', 'processedFixtureCount')
            const progress = progressFields
              .some((field) => currentCursor[field] > previousCursor[field])
              || currentCursor.uniqueProcessedFixtureCount > previousCursor.uniqueProcessedFixtureCount
              || addedProcessedFixtureId
              || currentCursor.fixtureRemainingCount < previousCursor.fixtureRemainingCount
              || currentCursor.fixtureStableEmptyPasses > previousCursor.fixtureStableEmptyPasses
              || stages.indexOf(currentCursor.coreStage) > stages.indexOf(previousCursor.coreStage)
              || (!previousCursor.coverageComplete && currentCursor.coverageComplete)
              || (!previousCursor.roundsComplete && currentCursor.roundsComplete)
              || (!previousCursor.coreAuxiliaryComplete && currentCursor.coreAuxiliaryComplete)
              || addedBatchSignature
            return { valid: true, regression: false, progress, reason: progress ? 'CURSOR_ADVANCED' : 'CURSOR_UNCHANGED' }
          }

          function isSafePlannedContinuation(result, disposition, previousCursor = null, evidenceOverride = null, transitionOverride = null) {
            const step = disposition.step
            const policy = disposition.policy
            const currentCursor = getContinuationCursor(step)
            const transition = transitionOverride ?? inspectContinuationTransition(previousCursor, currentCursor)
            if (transition.regression) return false
            const evidence = evidenceOverride ?? getCanonicalCurrentFailureEvidence(result, step)
            const executionBudgetDeferred = [policy?.reason, disposition.reason, step?.summary?.details?.reason]
              .some((reason) => ['EXECUTION_BUDGET_DEFERRED', 'SOFT_DEADLINE_REACHED'].includes(String(reason ?? '')))
            if (!transition.valid && !executionBudgetDeferred) return false
            const progressVerified = transition.progress
              || executionBudgetDeferred
              || (previousCursor && transition.reason === 'CURSOR_UNCHANGED')
            const partialContinuation = result.partial === true
              || result.status === 'pending_retry'
              || step?.summary?.partial === true
              || step?.summary?.status === 'partial_success'
            return result.ok === true
              && !evidence.hasRealFailure
              && partialContinuation
              && progressVerified
              && Boolean(step?.next_retry_at)
              && Number.isFinite(new Date(step?.next_retry_at).getTime())
          }

          function getRetryWindowDecision(result, nowMs = Date.now(), maxInlineWaitSeconds = 60) {
            const disposition = classifyWorkflowContinuation(result)
            const step = disposition.step
            if (step?.status === 'running' && disposition.kind === 'planned_continuation') return { action: 'schedule_next_workflow', retryAfterSeconds: 0, disposition }
            if (step?.status !== 'pending_retry') return { action: 'continue', retryAfterSeconds: 0, disposition }
            if (!step.next_retry_at) return { action: 'failure', reason: `pending_retry step ${step.phase} is missing next_retry_at`, disposition }
            const retryAfterSeconds = Math.ceil((new Date(step.next_retry_at).getTime() - nowMs) / 1000)
            if (!Number.isFinite(retryAfterSeconds)) return { action: 'failure', reason: `pending_retry step ${step.phase} has invalid next_retry_at`, disposition }
            if (retryAfterSeconds <= 0) return { action: 'continue', retryAfterSeconds: 0, disposition }
            if (disposition.kind !== 'planned_continuation') return { action: 'failure', reason: `Unclassified retry window for ${step.phase}`, disposition }
            if (retryAfterSeconds > maxInlineWaitSeconds) return { action: 'schedule_next_workflow', retryAfterSeconds, disposition }
            return { action: 'wait', retryAfterSeconds: Math.max(1, retryAfterSeconds), disposition }
          }

          function assertPipelineState(result, expectedRunId, previousState = null) {
            if (result.runId !== expectedRunId) throw new Error(`Continuation changed run id from ${expectedRunId} to ${result.runId ?? 'missing'}`)
            const required = getRequiredSteps(result)
            if (required.length !== requiredPhases.length) throw new Error(`Canonical run ${expectedRunId} is missing required steps`)
            for (const phase of requiredPhases) {
              if ((result.steps ?? []).filter((step) => (step.phase ?? step.mode) === phase).length !== 1) throw new Error(`Canonical run ${expectedRunId} has invalid step cardinality for ${phase}`)
            }
            const blocking = getBlockingStep(result)
            const blockingPhase = blocking?.phase ?? blocking?.mode ?? null
            const evidence = getCanonicalCurrentFailureEvidence(result, blocking)
            if (evidence.hasRealFailure) throw new Error(`Daily pipeline real failure at ${blocking?.phase ?? result.phase ?? 'unknown'}: ${evidence.reasons.join(',')}`)
            const previousCursor = previousState?.phase === blockingPhase ? previousState.cursor : null
            let transition = null
            if (blocking?.status === 'pending_retry') {
              transition = inspectContinuationTransition(previousCursor, getContinuationCursor(blocking))
              if (transition.regression) throw new Error(`Daily pipeline rejected unsafe planned continuation at ${blocking?.phase ?? result.phase ?? 'unknown'}: ${transition.reason}`)
              if (!blocking.next_retry_at || !Number.isFinite(new Date(blocking.next_retry_at).getTime())) {
                throw new Error(`Daily pipeline rejected unsafe planned continuation at ${blocking?.phase ?? result.phase ?? 'unknown'}: INVALID_NEXT_RETRY_AT`)
              }
            }
            const policy = getStepContinuationPolicy(blocking)
            if (policy?.kind === 'real_failure' && policy?.reason) {
              console.log(`Ignoring unconfirmed advisory policy reason ${maskText(policy.reason)}; canonical current failure evidence is empty.`)
            }
            const disposition = classifyWorkflowContinuation(result, evidence)
            if (disposition.kind === 'planned_continuation') {
              if (blocking?.status === 'pending_retry' && !isSafePlannedContinuation(result, disposition, previousCursor, evidence, transition)) {
                throw new Error(`Daily pipeline rejected unsafe planned continuation at ${blocking?.phase ?? result.phase ?? 'unknown'}`)
              }
              return { ...disposition, phase: blockingPhase, cursor: blocking ? getContinuationCursor(blocking) : null }
            }
            assertGenericModeSuccess('daily-sync-auto', result, { ignoreSyntheticFailureDiagnostics: true })
            return { ...disposition, phase: blockingPhase, cursor: blocking ? getContinuationCursor(blocking) : null }
          }

          function logContinuation(result, invocation) {
            const step = getBlockingStep(result)
            const cursor = getContinuationCursor(step)
            console.log(JSON.stringify(sanitize({
              runId: result.runId,
              phase: step?.phase ?? result.phase ?? null,
              step: step?.step_order ?? null,
              invocation,
              attempt: step?.attempt_count ?? null,
              cursor: {
                providerPage: cursor.providerPage ?? step?.provider_page ?? null,
                fixtureOffset: cursor.fixtureOffset ?? step?.fixture_offset ?? null,
                oddsOffset: cursor.oddsOffset ?? step?.odds_offset ?? null,
                processedFixtureCount: cursor.processedFixtureCount ?? step?.processed_fixture_count ?? null,
                fixtureCursorMode: cursor.fixtureCursorMode,
                processedFixtureIds: cursor.processedFixtureIds,
                uniqueProcessedFixtureCount: cursor.uniqueProcessedFixtureCount,
                fixtureCandidateCount: cursor.fixtureCandidateCount,
                fixtureRemainingCount: cursor.fixtureRemainingCount,
                fixtureSnapshotSignature: cursor.fixtureSnapshotSignature,
                fixtureStableEmptyPasses: cursor.fixtureStableEmptyPasses,
                legacyFixtureOffsetIgnored: cursor.legacyFixtureOffsetIgnored,
                legacyFixtureOffsetValue: cursor.legacyFixtureOffsetValue,
                lastProcessedFixtureId: cursor.lastProcessedFixtureId ?? step?.last_processed_fixture_id ?? null,
                batchSignature: cursor.batchSignature ?? step?.batch_signature ?? null,
                completedBatchSignatures: cursor.completedBatchSignatures ?? [],
                coreStage: cursor.coreStage ?? null,
                coverageOffset: cursor.coverageOffset ?? null,
                coverageTotalCandidates: cursor.coverageTotalCandidates ?? null,
                coverageComplete: cursor.coverageComplete ?? false,
                roundsOffset: cursor.roundsOffset ?? null,
                roundsTotalCandidates: cursor.roundsTotalCandidates ?? null,
                roundsComplete: cursor.roundsComplete ?? false,
                coreAuxiliaryComplete: cursor.coreAuxiliaryComplete ?? false,
              },
              nextRetryAt: step?.next_retry_at ?? null,
              status: result.status,
              continuationKind: getStepContinuationPolicy(step)?.kind ?? null,
              continuationReason: getStepContinuationPolicy(step)?.reason ?? null,
            })))
          }

          async function waitForRetryWindow(result) {
            const decision = getRetryWindowDecision(result)
            if (decision.action === 'failure') throw new Error(decision.reason)
            if (decision.action === 'schedule_next_workflow') {
              const cursor = getContinuationCursor(decision.disposition.step)
              console.log(`continuation scheduled runId=${result.runId} phase=${decision.disposition.step?.phase ?? result.phase ?? 'unknown'} fixtureOffset=${cursor.fixtureOffset} processedFixtureCount=${cursor.processedFixtureCount} coreStage=${cursor.coreStage} coverageOffset=${cursor.coverageOffset} roundsOffset=${cursor.roundsOffset} nextRetryAt=${decision.disposition.step?.next_retry_at}`)
              return decision
            }
            if (decision.action === 'wait') {
              console.log(`daily-sync-auto planned continuation; waiting ${decision.retryAfterSeconds}s for the persisted retry window`)
              await new Promise((resolve) => setTimeout(resolve, decision.retryAfterSeconds * 1000))
            }
            return decision
          }

          async function main() {
          const continuationChainDepth = parseContinuationChainDepth(process.env.CONTINUATION_CHAIN_DEPTH)
          const selfContinuationDriver = eventName === 'schedule' || continuationChainDepth > 0
          let initialPayload = { mode: 'daily-sync-auto' }
          let canonicalRunDate = bangkokDateKey()
          let preInvokeRunId = null
          let dailyBootstrap = null
          if (selfContinuationDriver) {
            const continuation = await getScheduledContinuation()
            canonicalRunDate = continuation.runDate
            if (continuation.bootstrap) {
              dailyBootstrap = { runDate: continuation.runDate }
              console.log(`daily bootstrap required runDate=${continuation.runDate}`)
            } else if (continuation.activeClaim) {
              console.log(`active claim runDate=${continuation.runDate} runId=${continuation.runId} phase=${continuation.phase ?? 'none'}`)
              return
            } else if (!continuation.due) {
              console.log(`no continuation due reason=${continuation.reason} runDate=${continuation.runDate} runId=${continuation.runId ?? 'none'} phase=${continuation.phase ?? 'none'} nextRetryAt=${continuation.nextRetryAt ?? 'none'}`)
              console.log(`no continuation required reason=${continuation.reason} runDate=${continuation.runDate}`)
              return
            } else {
              console.log(`continuation due runId=${continuation.runId} phase=${continuation.phase} nextRetryAt=${continuation.nextRetryAt}`)
              preInvokeRunId = continuation.runId
              initialPayload = {
                mode: 'daily-sync-auto',
                runId: continuation.runId,
                autoAdvance: true,
                maxStepsPerRequest: 2,
              }
            }
          }

          let dailySync = await postSync(initialPayload)
          const runId = dailySync.runId
          if (!runId) {
            throw new Error('daily-sync-auto response did not include runId')
          }
          const expectedRunId = preInvokeRunId ?? runId
          let pipelineState = assertPipelineState(dailySync, expectedRunId)
          logContinuation(dailySync, 1)
          let continuationScheduled = false
          let invocationCount = 1
          let previousCursorKey = continuationCursorKey(dailySync)
          let repeatedNoProgress = 0

          for (let invocation = 2; invocation <= 12 && !selfContinuationDriver && !isComplete(dailySync); invocation += 1) {
            const retryWindow = await waitForRetryWindow(dailySync)
            if (retryWindow.action === 'schedule_next_workflow') {
              continuationScheduled = true
              break
            }
            console.log(`Continuing daily-sync-auto run ${runId}; invocation ${invocation}/12`)
            dailySync = await postSync({
              mode: 'daily-sync-auto',
              runId,
              autoAdvance: true,
              maxStepsPerRequest: 2,
            })
            invocationCount = invocation
            pipelineState = assertPipelineState(dailySync, runId, pipelineState)
            logContinuation(dailySync, invocation)
            const disposition = classifyWorkflowContinuation(dailySync)
            const currentCursorKey = continuationCursorKey(dailySync)
            if (disposition.kind === 'planned_continuation' && currentCursorKey === previousCursorKey) {
              repeatedNoProgress += 1
            } else {
              repeatedNoProgress = 0
            }
            if (repeatedNoProgress >= 3) throw new Error(`STUCK_CONTINUATION: cursor did not advance for ${repeatedNoProgress} consecutive invocations`)
            previousCursorKey = currentCursorKey
          }

          const canonicalState = await getCanonicalState(canonicalRunDate, 'canonical post-invoke check')
          if (canonicalState.run.id !== expectedRunId) {
            throw new Error(`Canonical post-invoke run id mismatch: expected ${expectedRunId}, found ${canonicalState.run.id}`)
          }
          if (dailyBootstrap) {
            console.log(`daily bootstrap invoked runDate=${dailyBootstrap.runDate} runId=${runId}`)
            assertCanonicalRunCreated(canonicalState, dailyBootstrap.runDate, runId)
          }

          const selfContinuation = getSelfContinuationDecision(canonicalState, expectedRunId)

          if (isComplete(dailySync)) {
            if (selfContinuation.reason !== 'canonical_run_complete') {
              throw new Error(`Canonical post-invoke state did not confirm completed run ${runId}`)
            }
            console.log(`Daily Market-Ready pipeline ${runId} completed all required phases.`)
            await postSync({ mode: 'result-refresh', limit: 20 })
            console.log('Daily football sync workflow completed successfully.')
            return
          }

          {
            const step = getBlockingStep(dailySync)
            const disposition = classifyWorkflowContinuation(dailySync)
            const finalRetryWindow = getRetryWindowDecision(dailySync)
            if (finalRetryWindow.action === 'failure') throw new Error(finalRetryWindow.reason)
            if (disposition.kind !== 'planned_continuation') {
              throw new Error(`Daily pipeline incomplete after continuation budget: status=${dailySync.status ?? 'unknown'}, phase=${step?.phase ?? dailySync.phase ?? 'unknown'}, next_retry_at=${step?.next_retry_at ?? 'missing'}`)
            }
            const cursor = getContinuationCursor(step)
            console.log(`continuation scheduled runId=${runId} phase=${step?.phase ?? dailySync.phase ?? 'unknown'} fixtureOffset=${cursor.fixtureOffset} processedFixtureCount=${cursor.processedFixtureCount} coreStage=${cursor.coreStage} coverageOffset=${cursor.coverageOffset} roundsOffset=${cursor.roundsOffset} nextRetryAt=${step?.next_retry_at ?? 'active-claim'} invocation=${invocationCount}/12 deferred=${continuationScheduled}`)
          }

          if (!selfContinuation.required) {
            if (selfContinuation.activeClaim) {
              console.log(`active claim runDate=${canonicalRunDate} runId=${expectedRunId} phase=${selfContinuation.phase ?? 'none'}`)
            }
            console.log(`no continuation required reason=${selfContinuation.reason} runDate=${canonicalRunDate} runId=${expectedRunId}`)
            if (selfContinuation.fatal) throw new Error(`Self continuation rejected: ${selfContinuation.reason}`)
            return
          }

          console.log(`self continuation required runId=${expectedRunId} phase=${selfContinuation.phase} nextRetryAt=${selfContinuation.nextRetryAt} depth=${continuationChainDepth}`)
          if (continuationChainDepth >= 20) {
            console.log(`continuation chain depth exhausted depth=${continuationChainDepth}`)
            throw new Error('Continuation chain depth exhausted at maximum depth 20')
          }
          await waitForSelfContinuation(selfContinuation.nextRetryAt)
          await dispatchSelfContinuation(continuationChainDepth + 1)
          }

          main().catch((error) => {
            const failure = maskText(error?.stack ?? error?.message ?? error) || 'UNKNOWN_WORKFLOW_FAILURE'
            console.error(`Daily football sync workflow failed: ${failure}`)
            process.exitCode = 1
          })
          NODE
